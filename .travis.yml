language: generic
sudo: required
services:
  - docker

before_install:
  - docker build -t nerojz/docker-react -f Dockerfile.dev .

script:
  - docker run -e CI=true nerojz/docker-react npm run test -- --coverage

deploy:
  provider: elasticbeanstalk
  access_key_id:
    secure: "$AwsAccessKey"
  secret_access_key:
    secure: "$AwsSecretKey"
  region: "southeast-1"
  app: "docker-react"
  env: "Dockerreact-env"
  bucket_name: "elasticbeanstalk-ap-southeast-1-521741517750"
